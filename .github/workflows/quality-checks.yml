name: Quality Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md blogs/**/*.md blogs/**/*.mdx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
